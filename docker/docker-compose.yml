# Stack: API + PostgreSQL + Redis + Meilisearch (see Dockerfile in this folder).
# Config: `ELIDUNE_*` overrides TOML — see src/config.rs. Optional: `env_file: [.env]`.
#
# Optional (set in `.env`; do not set empty values — breaks deserialization):
#   ELIDUNE_SERVER__CORS_ORIGINS — JSON array
#   ELIDUNE_LOGGING__FILE_PATH, ELIDUNE_LOGGING__FILE_ROTATION — when logging.output=file
#

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${ELIDUNE_IMAGE:-elidune-server:local}
    command: ["/app/elidune-server", "--config", "/app/config/default.toml"]
    ports:
      - "${API_PORT:-8080}:8080"
    environment:

      RUST_LOG: ${RUST_LOG:-elidune_server=info,tower_http=info}

      ELIDUNE_SERVER__HOST: ${ELIDUNE_SERVER__HOST:-0.0.0.0}
      ELIDUNE_SERVER__PORT: ${ELIDUNE_SERVER__PORT:-8080}
      ELIDUNE_SERVER__AUTH_RATE_PER_SECOND: ${ELIDUNE_SERVER__AUTH_RATE_PER_SECOND:-4}
      ELIDUNE_SERVER__AUTH_RATE_BURST: ${ELIDUNE_SERVER__AUTH_RATE_BURST:-2}
      ELIDUNE_SERVER__PUBLIC_RATE_PER_SECOND: ${ELIDUNE_SERVER__PUBLIC_RATE_PER_SECOND:-30}
      ELIDUNE_SERVER__PUBLIC_RATE_BURST: ${ELIDUNE_SERVER__PUBLIC_RATE_BURST:-100}

      ELIDUNE_DATABASE__URL: ${ELIDUNE_DATABASE__URL:-postgres://elidune:elidune@db:5432/elidune}
      ELIDUNE_DATABASE__MAX_CONNECTIONS: ${ELIDUNE_DATABASE__MAX_CONNECTIONS:-10}
      ELIDUNE_DATABASE__MIN_CONNECTIONS: ${ELIDUNE_DATABASE__MIN_CONNECTIONS:-2}

      ELIDUNE_USERS__JWT_SECRET: ${ELIDUNE_USERS__JWT_SECRET:-change-this-secret-in-production}
      ELIDUNE_USERS__JWT_EXPIRATION_HOURS: ${ELIDUNE_USERS__JWT_EXPIRATION_HOURS:-24}

      ELIDUNE_LOGGING__LEVEL: ${ELIDUNE_LOGGING__LEVEL:-info}
      ELIDUNE_LOGGING__FORMAT: ${ELIDUNE_LOGGING__FORMAT:-plain}
      ELIDUNE_LOGGING__OUTPUT: ${ELIDUNE_LOGGING__OUTPUT:-stdout}
      ELIDUNE_LOGGING__OVERRIDABLE: ${ELIDUNE_LOGGING__OVERRIDABLE:-true}

      ELIDUNE_EMAIL__SMTP_HOST: ${ELIDUNE_EMAIL__SMTP_HOST:-}
      ELIDUNE_EMAIL__SMTP_PORT: ${ELIDUNE_EMAIL__SMTP_PORT:-587}
      ELIDUNE_EMAIL__SMTP_USERNAME: ${ELIDUNE_EMAIL__SMTP_USERNAME:-}
      ELIDUNE_EMAIL__SMTP_PASSWORD: ${ELIDUNE_EMAIL__SMTP_PASSWORD:-}
      ELIDUNE_EMAIL__SMTP_FROM: ${ELIDUNE_EMAIL__SMTP_FROM:-}
      ELIDUNE_EMAIL__SMTP_FROM_NAME: ${ELIDUNE_EMAIL__SMTP_FROM_NAME:-}
      ELIDUNE_EMAIL__SMTP_USE_TLS: ${ELIDUNE_EMAIL__SMTP_USE_TLS:-true}
      ELIDUNE_EMAIL__TEMPLATES_DIR: ${ELIDUNE_EMAIL__TEMPLATES_DIR:-data/email_templates}
      ELIDUNE_EMAIL__OVERRIDABLE: ${ELIDUNE_EMAIL__OVERRIDABLE:-true}

      ELIDUNE_REDIS__URL: ${ELIDUNE_REDIS__URL:-redis://redis:6379}
      ELIDUNE_REDIS__Z3950_CACHE_TTL_SECONDS: ${ELIDUNE_REDIS__Z3950_CACHE_TTL_SECONDS:-604800}

      ELIDUNE_REMINDERS__ENABLED: ${ELIDUNE_REMINDERS__ENABLED:-true}
      ELIDUNE_REMINDERS__FREQUENCY_DAYS: ${ELIDUNE_REMINDERS__FREQUENCY_DAYS:-7}
      ELIDUNE_REMINDERS__SEND_TIME: ${ELIDUNE_REMINDERS__SEND_TIME:-09:00}
      ELIDUNE_REMINDERS__SMTP_THROTTLE_MS: ${ELIDUNE_REMINDERS__SMTP_THROTTLE_MS:-100}
      ELIDUNE_REMINDERS__OVERRIDABLE: ${ELIDUNE_REMINDERS__OVERRIDABLE:-true}

      ELIDUNE_AUDIT__RETENTION_DAYS: ${ELIDUNE_AUDIT__RETENTION_DAYS:-365}
      ELIDUNE_AUDIT__OVERRIDABLE: ${ELIDUNE_AUDIT__OVERRIDABLE:-true}

      ELIDUNE_HOLDS__READY_EXPIRY_DAYS: ${ELIDUNE_HOLDS__READY_EXPIRY_DAYS:-7}
      ELIDUNE_HOLDS__OVERRIDABLE: ${ELIDUNE_HOLDS__OVERRIDABLE:-true}

      ELIDUNE_MEILISEARCH__URL: ${ELIDUNE_MEILISEARCH__URL:-http://meilisearch:7700}
      # Defaults to MEILI_MASTER_KEY when ELIDUNE_MEILISEARCH__API_KEY is unset
      ELIDUNE_MEILISEARCH__API_KEY: ${ELIDUNE_MEILISEARCH__API_KEY:-${MEILI_MASTER_KEY:-changeme}}
      ELIDUNE_MEILISEARCH__INDEX_NAME: ${ELIDUNE_MEILISEARCH__INDEX_NAME:-items}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - elidune-network

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - elidune-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elidune
      POSTGRES_PASSWORD: elidune
      POSTGRES_DB: elidune
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elidune -d elidune"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - elidune-network

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${ELIDUNE_MEILISEARCH__API_KEY:-changeme}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:7700/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - elidune-network

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@elidune.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - elidune-network
    profiles:
      - tools

volumes:
  postgres_data:
  meili_data:

networks:
  elidune-network:
    driver: bridge
