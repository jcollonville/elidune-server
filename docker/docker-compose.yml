services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["/app/elidune-server", "--config", "/app/config/default.toml"]
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=${RUST_LOG:-elidune_server=info,tower_http=info}
    volumes:
      - ./config.docker.toml:/app/config/default.toml:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - elidune-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - elidune-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=elidune
      - POSTGRES_PASSWORD=elidune
      - POSTGRES_DB=elidune
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elidune -d elidune"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - elidune-network

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-changeme}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped
    networks:
      - elidune-network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@elidune.org
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - elidune-network
    profiles:
      - tools

volumes:
  postgres_data:
  meili_data:

networks:
  elidune-network:
    driver: bridge


