# Publishes the "complete" all-in-one image (API + web UI + PostgreSQL + Redis + Nginx in one image).
# For the API-only image used by docker/docker-compose.yml, build locally:
#   docker build -f docker/Dockerfile -t elidune-server:local .
name: Build & Push Docker Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jcollonville/elidune-complete

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.complete
          push: true
          tags: |
            ghcr.io/elidune/elidune-complete:latest
            ghcr.io/elidune/elidune-complete:${{ github.sha }}