# Publishes:
# - API-only image (docker/Dockerfile) → ghcr.io/elidune/elidune-server
# - All-in-one image (docker/Dockerfile.all-in-one) → ghcr.io/elidune/elidune-all-in-one
name: Build & Push Docker Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./docker/Dockerfile
            image: ghcr.io/elidune/elidune-server
          - dockerfile: ./docker/Dockerfile.all-in-one
            image: ghcr.io/elidune/elidune-all-in-one
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
