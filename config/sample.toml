# Elidune Server Configuration

[server]
host = "0.0.0.0"
port = 8080
# Optional rate limits (per IP): auth = login/register; public = OPAC, covers, library-info GET
# auth_rate_per_second = 4
# auth_rate_burst = 2
# public_rate_per_second = 30
# public_rate_burst = 100

[database]
url = "postgres://elidune:elidune@localhost:5432/elidune"
max_connections = 10
min_connections = 2

[users]
jwt_secret = "change-this-secret-in-production"
jwt_expiration_hours = 24
# Optional: full URL for password-reset emails when the SPA does not send `resetUrl`.
# Example: "https://library.example.org/reset-password?token=<token>"
# password_reset_url_template = ""

[logging]
level = "debug"
format = "pretty"       # "pretty" | "plain" | "json"
output = "stdout"       # "stdout" | "stderr" | "file" | "syslog"
# file_path = "logs/elidune.log"   # required when output = "file"
# file_rotation = "daily"          # "daily" | "hourly" | "never" (default: daily)
overridable = true

[email]
smtp_host = ""
smtp_port = 587
smtp_username = ""
smtp_password = ""
smtp_from = ""
smtp_from_name = "Elidune"
smtp_use_tls = true
# templates_dir = "data/email_templates"  # optional, default
overridable = true

[redis]
url = "redis://127.0.0.1:6379"
z3950_cache_ttl_seconds = 604800  # 7 days in seconds


[reminders]
enabled = true
frequency_days = 7      # Minimum days between two reminders for the same loan
send_time = "09:00"     # HH:MM (24h) when the scheduler sends reminders
smtp_throttle_ms = 100  # Delay between individual emails (ms)
overridable = true

[audit]
retention_days = 365    # Audit log entries older than this are deleted automatically
overridable = true

[holds]
ready_expiry_days = 7   # Days to pick up a hold after it becomes "ready" (drives expires_at)
overridable = true

[meilisearch]
url = "http://localhost:7700"
api_key = "changeme"           # optional — omit if running without auth
index_name = "items"           # default: "items"